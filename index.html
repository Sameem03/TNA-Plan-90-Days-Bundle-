<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BÜNDLE.CO — 90-Day Time & Action Calendar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f3ef;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #4a4a46;
    --color-text-tertiary: #8a8a84;
    --color-border-primary: #d0cec8;
    --color-border-secondary: #e2dfd9;
    --color-border-tertiary: #edeae4;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
    --font-sans: 'DM Sans', sans-serif;
    --accent-green: #0F6E56;
    --accent-blue: #185FA5;
    --accent-orange: #C4511A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: #e8e3da;
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page-wrap {
    max-width: 900px;
    margin: 0 auto;
    background: #faf8f5;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  .page-header {
    background: linear-gradient(135deg, #1a1a18 0%, #2e2b25 100%);
    padding: 1.75rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #ffffff;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    letter-spacing: .4px;
    position: relative;
    z-index: 1;
  }

  .page-body { padding: 1.75rem 2rem 2rem; }

  .page-body { padding: 1.75rem 2rem 2rem; }

  .top-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { border-radius: var(--border-radius-md); padding: .875rem 1rem; border: none; }
  .stat-m1 { background: #E1F5EE; }
  .stat-m2 { background: #DDEEFF; }
  .stat-m3 { background: #FAECE7; }
  .stat-label { font-size: 12px; margin-bottom: 4px; }
  .stat-m1 .stat-label { color: #0F6E56; }
  .stat-m2 .stat-label { color: #185FA5; }
  .stat-m3 .stat-label { color: #853C1D; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--color-text-primary); }
  .stat-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

  .filters { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .fbtn { font-size: 12px; padding: 5px 14px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); transition: all .15s; }
  .fbtn:hover { background: var(--color-background-secondary); }
  .fbtn.on { font-weight: 600; border-color: transparent; }
  .fbtn-all.on  { background: #1a1a18; color: #fff; }
  .fbtn-p1.on   { background: #E1F5EE; color: #0F6E56; border-color: #b2e4d4 !important; }
  .fbtn-p2.on   { background: #DDEEFF; color: #185FA5; border-color: #b0d4f5 !important; }
  .fbtn-p3.on   { background: #FAECE7; color: #853C1D; border-color: #f0c4b0 !important; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; padding: 10px 14px; background: #f0ede7; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-tertiary); }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; }

  .week { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 10px; overflow: hidden; }
  .week[data-phase="p1"] { border-left: 3px solid #1D9E75; }
  .week[data-phase="p2"] { border-left: 3px solid #378ADD; }
  .week[data-phase="p3"] { border-left: 3px solid #D85A30; }
  .week-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; background: var(--color-background-primary); transition: background .15s; }
  .week-hdr:hover { background: var(--color-background-secondary); }
  .week-left { display: flex; align-items: center; gap: 10px; }
  .phase-pill { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: var(--border-radius-md); letter-spacing: .5px; white-space: nowrap; text-transform: uppercase; }
  .p1-pill { background: #E1F5EE; color: #0F6E56; }
  .p2-pill { background: #E6F1FB; color: #185FA5; }
  .p3-pill { background: #FAECE7; color: #853C1D; }
  .week-num { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: .5px; margin-bottom: 2px; }
  .week-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .week-obj { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  .chev { font-size: 18px; color: var(--color-text-tertiary); transition: transform .2s; }
  .chev.open { transform: rotate(180deg); }

  .week-body { border-top: 1px solid var(--color-border-tertiary); display: none; }

  .explanation { padding: 14px 16px; background: #f5f3ef; border-bottom: 1px solid var(--color-border-tertiary); }
  .exp-title { font-size: 11px; font-weight: 600; color: var(--color-text-tertiary); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 10px; }
  .exp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .exp-card { background: #ffffff; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .exp-card-title { font-size: 11px; font-weight: 600; color: var(--color-text-tertiary); letter-spacing: .4px; margin-bottom: 6px; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
  .exp-card-body { font-size: 12px; color: var(--color-text-secondary); line-height: 1.65; }
  .focus-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .focus-tag { font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); background: #ffffff; border: 1px solid var(--color-border-secondary); color: var(--color-text-secondary); }

  .days-section { padding: 0; }
  .day-row { display: grid; grid-template-columns: 80px 1fr; gap: 0; border-bottom: 1px solid var(--color-border-tertiary); }
  .day-row:last-child { border-bottom: none; }
  .day-label { padding: 10px 12px; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); background: #f5f3ef; border-right: 1px solid var(--color-border-tertiary); }
  .day-tasks { padding: 8px 12px; display: flex; flex-direction: column; gap: 5px; }

  /* Task row */
  .task-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--color-text-primary); line-height: 1.5; cursor: pointer; padding: 3px 4px; border-radius: 5px; transition: background .12s; }
  .task-item:hover { background: #f0ede7; }
  .task-item.done { opacity: .55; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--color-text-tertiary); }

  /* Custom checkbox */
  .task-cb { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--color-border-primary); background: #fff; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
  .task-item.done .task-cb { background: #1D9E75; border-color: #1D9E75; }
  .task-item.done .task-cb::after { content: ''; display: block; width: 4px; height: 7px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }

  .tdot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .tprod { background: #1D9E75; }
  .tcont { background: #378ADD; }
  .tplat { background: #D85A30; }
  .tout { background: #7F77DD; }
  .tadm { background: #888780; }
  .task-time { font-size: 11px; color: var(--color-text-tertiary); white-space: nowrap; margin-left: auto; padding-left: 8px; flex-shrink: 0; }

  /* Progress bar per week */
  .week-progress { padding: 0 16px 10px; background: var(--color-background-primary); }
  .progress-track { height: 4px; background: #e8e3da; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: #1D9E75; transition: width .3s ease; }
  .progress-label { font-size: 10px; color: var(--color-text-tertiary); margin-top: 4px; letter-spacing: .3px; }

  .milestones { padding: 10px 16px; background: #fdf6e8; border-top: 1px solid #f0e4c0; display: flex; flex-direction: column; gap: 5px; }
  .ms-item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; color: #6b4c0f; }
  .ms-icon { color: #BA7517; font-size: 14px; }

  @media (max-width: 640px) {
    .top-stats { grid-template-columns: 1fr; }
    .exp-grid { grid-template-columns: 1fr; }
    body { padding: 1rem .5rem; }
    .page-body { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <h1>BÜNDLE.CO — 90-Day Action Calendar</h1>
    <div class="header-sub">Time · Tasks · Milestones · Revenue targets</div>
  </div>

  <div class="page-body">
  <div class="tna">
    <div class="top-stats">
      <div class="stat stat-m1"><div class="stat-label">Month 1 target</div><div class="stat-val">$100–200</div><div class="stat-sub">First sales · platform setup</div></div>
      <div class="stat stat-m2"><div class="stat-label">Month 2 target</div><div class="stat-val">$400–700</div><div class="stat-sub">Fiverr + Etsy combined</div></div>
      <div class="stat stat-m3"><div class="stat-label">Month 3 target</div><div class="stat-val">$800–1,200</div><div class="stat-sub">All 3 streams active</div></div>

    <div class="legend">
      <div class="leg-item"><div class="leg-dot tprod"></div>Product build</div>
      <div class="leg-item"><div class="leg-dot tcont"></div>Content</div>
      <div class="leg-item"><div class="leg-dot tplat"></div>Platform setup</div>
      <div class="leg-item"><div class="leg-dot tout"></div>Outreach</div>
      <div class="leg-item"><div class="leg-dot tadm"></div>Admin / review</div>
      <div class="leg-item"><i class="ti ti-trophy ms-icon"></i>Milestone</div>
    </div>

    <div class="filters">
      <button class="fbtn fbtn-all on" onclick="filter('all',this)">All phases</button>
      <button class="fbtn fbtn-p1" onclick="filter('p1',this)">Phase 1 — Foundation</button>
      <button class="fbtn fbtn-p2" onclick="filter('p2',this)">Phase 2 — Expansion</button>
      <button class="fbtn fbtn-p3" onclick="filter('p3',this)">Phase 3 — Scale</button>
    </div>

    <div id="wlist"></div>
  </div>
  </div>
</div>

<script>

explanation:{
  why:"Nothing can happen until your brand has a home. Week 1 is the only week where you spend more time on setup than creation. Every hour here is a one-time cost that unlocks everything that follows. You cannot post content without an account. You cannot make sales without a listing. You cannot get outreach replies without a profile that looks real.",
  what:"By end of Week 1 you will have a professional Instagram profile with a complete 9-post grid, an Etsy shop with your first listing live at $36, a Gumroad page as a second income point, and a Behance account ready for your portfolio. Your hoodie tech pack — which is already built — becomes your first digital product.",
  outcome:"End of week you have a real business presence. Anyone who finds BÜNDLE.CO this week sees a complete, professional brand — not an empty account. The 9-post grid is critical because Instagram profiles with fewer than 9 posts lose visitors immediately. First impressions are permanent."

{id:"w2",phase:"p1",num:"Week 2",title:"T-shirt pack and first outreach",obj:"T-shirt tech pack built · 10 DMs sent · Behance live",
explanation:{
  why:"Week 2 shifts from setup to production. The hoodie pack proves you can build a tech pack — now you need to show range. A T-shirt is the second most searched garment on Etsy after hoodies, and it is significantly faster to build because the construction is simpler. Building it this week also gives you a second product to reference in your outreach and a second listing driving Etsy traffic.",

// ── Persistence ──────────────────────────────────────────────
const STORE_KEY = 'bundleco_ticks';
function loadTicks(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; } }
function saveTicks(t){ localStorage.setItem(STORE_KEY, JSON.stringify(t)); }
let ticks = loadTicks();

// ── Progress ──────────────────────────────────────────────────
function weekTotal(w){ return w.days.reduce((n,d)=>n+d.tasks.length,0); }

function countDone(weekId, total){
  let n=0;
  for(let i=0;i<total;i++) if(ticks[weekId+':'+i]) n++;
  return n;
}

function updateWeekProgress(weekId, total){
  const bar   = document.getElementById('pf-'+weekId);
  const label = document.getElementById('pl-'+weekId);
  const badge = document.getElementById('hb-'+weekId);
  if(!bar) return;
  const done = countDone(weekId, total);
  const pct  = total ? Math.round(done/total*100) : 0;
  bar.style.width = pct+'%';
  bar.style.background = pct===100 ? '#BA7517' : '#1D9E75';
  label.textContent = done+' / '+total+' tasks complete';
  if(badge){
    badge.textContent = pct===100 ? '✓ All done' : done+'/'+total;
    badge.style.background = pct===100 ? '#fdf6e8' : '#f0f0f0';
    badge.style.color = pct===100 ? '#BA7517' : '#888780';
    badge.style.borderColor = pct===100 ? '#f0e4c0' : '#ddd';
  }
}

// ── Render ────────────────────────────────────────────────────
const dotClass={prod:"tprod",cont:"tcont",plat:"tplat",out:"tout",adm:"tadm"};

function render(f){
  const c=document.getElementById("wlist");
  c.innerHTML="";
  W.filter(w=>f==="all"||w.phase===f).forEach(w=>{
    const pill=w.phase==="p1"?'<span class="phase-pill p1-pill">Phase 1</span>':w.phase==="p2"?'<span class="phase-pill p2-pill">Phase 2</span>':'<span class="phase-pill p3-pill">Phase 3</span>';
    const e=w.explanation;
    const focusTags=w.focus.map(ft=>`<span class="focus-tag">${ft}</span>`).join("");
    const total=weekTotal(w);

    // flatten all tasks with a single global index per week
    let gi=0;
    const daysHtml=w.days.map(d=>`
      <div class="day-row">
        <div class="day-label">${d.label}</div>
        <div class="day-tasks">${d.tasks.map(t=>{
          const idx=gi++;
          const key=w.id+':'+idx;
          const done=!!ticks[key];
          return `<div class="task-item${done?' done':''}" data-wid="${w.id}" data-idx="${idx}" data-total="${total}">
            <div class="task-cb"></div>
            <div class="tdot ${dotClass[t.type]||'tadm'}"></div>
            <span class="task-text">${t.text}</span>
            <span class="task-time">${t.time}</span>
          </div>`;
        }).join("")}
        </div>
      </div>`).join("");

    const msHtml=w.milestones.map(m=>`<div class="ms-item"><i class="ti ti-trophy ms-icon"></i>${m}</div>`).join("");
    const div=document.createElement("div");
    div.className="week";
    div.dataset.phase=w.phase;
    div.innerHTML=`
      <div class="week-hdr" onclick="toggle('${w.id}')">
        <div class="week-left">
          ${pill}
          <div class="week-info">
            <div class="week-num">${w.num}</div>
            <div class="week-title">${w.title}</div>
            <div class="week-obj">${w.obj}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="hb-${w.id}" style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid #ddd;background:#f0f0f0;color:#888780;white-space:nowrap">0/${total}</span>
          <i class="ti ti-chevron-down chev" id="cv-${w.id}"></i>
        </div>
      </div>
      <div class="week-body" id="bd-${w.id}">
        <div class="week-progress">
          <div class="progress-track"><div class="progress-fill" id="pf-${w.id}" style="width:0%"></div></div>
          <div class="progress-label" id="pl-${w.id}">0 / ${total} tasks complete</div>
        </div>
        <div class="explanation">
          <div class="exp-title">Week breakdown</div>
          <div class="exp-grid">
            <div class="exp-card">
              <div class="exp-card-title"><i class="ti ti-help-circle"></i>Why this week</div>
              <div class="exp-card-body">${e.why}</div>
            </div>
            <div class="exp-card">
              <div class="exp-card-title"><i class="ti ti-list-check"></i>What you will do</div>
              <div class="exp-card-body">${e.what}</div>
            </div>
            <div class="exp-card">
              <div class="exp-card-title"><i class="ti ti-target"></i>Expected outcome</div>
              <div class="exp-card-body">${e.outcome}</div>
            </div>
          </div>
          <div class="focus-bar">${focusTags}</div>
        </div>
        <div class="days-section">${daysHtml}</div>
        <div class="milestones">${msHtml}</div>
      </div>`;
    c.appendChild(div);
    updateWeekProgress(w.id, total);
  });

  // ── Single delegated listener on the whole list ──
  c.addEventListener('click', function(e){
    const item = e.target.closest('.task-item');
    if(!item) return;
    const wid   = item.dataset.wid;
    const idx   = item.dataset.idx;
    const total = parseInt(item.dataset.total);
    const key   = wid+':'+idx;
    ticks[key]  = !ticks[key];
    saveTicks(ticks);
    item.classList.toggle('done', !!ticks[key]);
    updateWeekProgress(wid, total);
  });
}

function toggle(id){
  const bd=document.getElementById("bd-"+id);
  const cv=document.getElementById("cv-"+id);
  const open=bd.style.display==="none"||bd.style.display==="";
  bd.style.display=open?"block":"none";
  cv.classList.toggle("open",open);
}

function filter(f,btn){
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render(f);
}

render("all");
</script>
